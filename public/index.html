<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Game Hub</title>
  <link rel="stylesheet" href="hub.css">
</head>
<body>
  <!-- Lobby Screen -->
  <div id="lobby" class="screen active">
    <div class="lobby-card">
      <h1>Game Hub</h1>
      <p class="subtitle">Играй вдвоем</p>
      <input type="text" id="playerName" placeholder="Твоё имя" maxlength="15" autocomplete="off">
      <div class="lobby-actions">
        <button id="createBtn" class="btn primary">Создать игру</button>
        <div class="divider">или</div>
        <div class="join-row">
          <input type="text" id="roomCodeInput" placeholder="ВВЕДИ КОД КОМНАТЫ" maxlength="6" autocomplete="off">
          <button id="joinBtn" class="btn primary">Войти</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Game Selection Screen -->
  <div id="gameSelect" class="screen">
    <div class="top-bar">
      <div class="player-info">
        <span id="myNameDisplay"></span>
        <span class="room-id-label">Код: <span id="myRoomId"></span></span>
      </div>
    </div>
    <div class="online-bar">
      <span class="online-label">В лобби:</span>
      <span id="onlinePlayers"></span>
    </div>
    <h2>Выберите игру</h2>
    <div class="games-grid">
      <div class="game-card" data-game="tetris">
        <div class="game-icon">🎮</div>
        <h3>Тетрис</h3>
        <p>Battle и Co-op</p>
      </div>
      <div class="game-card" data-game="pong">
        <div class="game-icon">🏓</div>
        <h3>Pong</h3>
        <p>Классический понг</p>
      </div>
      <div class="game-card" data-game="tictactoe">
        <div class="game-icon">❌</div>
        <h3>Крестики-нолики</h3>
        <p>Классика на двоих</p>
      </div>
      <div class="game-card" data-game="connect4">
        <div class="game-icon">🔴</div>
        <h3>Четыре в ряд</h3>
        <p>Стратегия и логика</p>
      </div>
      <div class="game-card" data-game="memory">
        <div class="game-icon">🧠</div>
        <h3>Пары</h3>
        <p>Найди все пары</p>
      </div>
    </div>
    <div id="gameProposal" class="proposal hidden"></div>
  </div>

  <!-- Waiting for opponent -->
  <div id="waiting" class="screen">
    <div class="waiting-card">
      <div class="spinner"></div>
      <h2>Ожидание противника...</h2>
      <p id="waitInfo"></p>
      <button id="cancelWait" class="btn secondary">Отмена</button>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="gameScreen" class="screen">
    <div class="game-header">
      <button id="backToMenu" class="btn-icon">← Меню</button>
      <span id="gameTitle"></span>
    </div>
    <div id="gameContainer"></div>
  </div>

  <!-- Chat -->
  <div id="chatWidget">
    <button id="chatToggle" class="chat-toggle">💬 Чат</button>
    <div id="chatPanel" class="chat-panel hidden">
      <div id="chatMessages" class="chat-messages"></div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="Сообщение..." maxlength="200">
        <button id="chatSend" class="btn small">→</button>
      </div>
    </div>
  </div>

  <script src="shared/chat.js"></script>
  <script src="hub.js"></script>
</body>
</html>
